<!DOCTYPE html>
<html>
<head>
    <title>Contact - POLLIFY</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5 pt-5">
    <h2 class="fw-bold text-center">Contact Us</h2>

    <div class="row justify-content-center mt-4">
        <div class="col-md-6">
            <form>
                <input type="text" class="form-control mb-3" placeholder="Your Name">
                <input type="email" class="form-control mb-3" placeholder="Your Email">
                <textarea class="form-control mb-3" rows="4" placeholder="Your Message"></textarea>
                <button class="btn btn-primary w-100 rounded-pill">Send Message</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
