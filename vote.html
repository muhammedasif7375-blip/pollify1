<!DOCTYPE html>
<html>
<head>
    <title>Vote - POLLIFY</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            background: linear-gradient(135deg, #f8fbff, #e2ecff);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }

        /* Navbar */
        .custom-nav {
            position: fixed;
            width: 100%;
            top: 0;
            padding: 15px 30px;
            background: rgba(255,255,255,0.95);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            z-index: 1000;
        }

        .custom-nav a {
            text-decoration: none;
            margin-right: 15px;
            color: #333;
            font-weight: 500;
        }

        .custom-nav a:hover {
            color: #0d6efd;
        }

        .content {
            margin-top: 140px;
        }

        .candidate-card {
            background: white;
            padding: 25px;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .candidate-card:hover {
            transform: translateY(-5px);
        }

        footer {
            margin-top: 60px;
            padding: 20px;
            text-align: center;
            color: gray;
        }
    </style>
</head>

<body>

<!-- Connected Navbar -->
<nav class="custom-nav">
    <div style="font-weight:bold;">
        <i class="bi bi-shield-check text-primary"></i> POLLIFY
    </div>

    <div>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="team.html">Team</a>
        <a href="contact.html">Contact</a>
        <a href="login.html">Login</a>
    </div>
</nav>

<!-- Voting Section -->
<div class="container content">
    <h2 class="fw-bold text-center mb-5">College Election 2026</h2>

    <form onsubmit="submitVote(event)">
        <div class="row g-4 justify-content-center">

            <div class="col-md-4">
                <div class="candidate-card text-center">
                    <i class="bi bi-person-circle text-primary" style="font-size:60px;"></i>
                    <h5 class="mt-3">Candidate 1</h5>
                    <div class="form-check mt-3">
                        <input class="form-check-input" type="radio" name="candidate" value="1" required>
                        <label class="form-check-label">
                            Select
                        </label>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="candidate-card text-center">
                    <i class="bi bi-person-circle text-primary" style="font-size:60px;"></i>
                    <h5 class="mt-3">Candidate 2</h5>
                    <div class="form-check mt-3">
                        <input class="form-check-input" type="radio" name="candidate" value="2">
                        <label class="form-check-label">
                            Select
                        </label>
                    </div>
                </div>
            </div>

        </div>

        <div class="text-center mt-5">
            <button type="submit" class="btn btn-primary px-5 rounded-pill">
                Submit Vote
            </button>
        </div>
    </form>

</div>

<footer>
    © 2026 Pollify. All rights reserved.
</footer>

<script>
function submitVote(event) {
    event.preventDefault();
    alert("Your vote has been submitted successfully!");
    window.location.href = "index.html";
}
</script>

</body>
</html>
