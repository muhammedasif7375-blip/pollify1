<!DOCTYPE html>
<html>
<head>
    <title>Register - POLLIFY</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            background: linear-gradient(135deg, #f8fbff, #e2ecff);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
        }

        .register-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 15px;
        }

        .register-card {
            width: 100%;
            max-width: 450px;
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }

        .form-control {
            border-radius: 12px;
            padding: 12px;
        }

        .btn-register {
            background: linear-gradient(90deg, #4e73df, #1cc88a);
            border: none;
            border-radius: 30px;
            padding: 12px;
            font-weight: 600;
            color: white;
        }

        .btn-register:hover {
            opacity: 0.9;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 14px;
            color: gray;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg px-4 shadow-sm">
    <div class="container-fluid">
        <span class="fw-bold">
            <i class="bi bi-shield-check text-primary"></i> Pollify
        </span>
        <a href="login.html" class="btn btn-outline-secondary rounded-pill px-4">Login</a>
    </div>
</nav>

<!-- Registration Section -->
<div class="register-wrapper">
    <div class="register-card">

        <h2 class="text-center fw-bold mb-4">Create Account</h2>

        <form id="registerForm">

            <div class="mb-3">
                <input type="text" class="form-control" placeholder="Full Name" required>
            </div>

            <div class="mb-3 input-group">
                <span class="input-group-text">+91</span>
                <input type="tel" class="form-control" placeholder="Phone Number" required>
            </div>

            <div class="mb-3">
                <input type="email" class="form-control" placeholder="Email" required>
            </div>

            <div class="mb-3">
                <label class="form-label small text-muted">Date of Birth</label>
                <input type="date" id="dob" class="form-control" required>
            </div>

            <div class="mb-3">
                <input type="password" class="form-control" placeholder="Password" required>
            </div>

            <div class="mb-3">
                <input type="password" class="form-control" placeholder="Confirm Password" required>
            </div>

            <button type="button" onclick="validateRegistration()" 
                class="btn btn-register w-100">
                Continue
            </button>

        </form>

        <p class="text-center mt-3">
            Already have an account?
            <a href="login.html">Log in</a>
        </p>

        <p class="text-center text-muted small mt-2">
            By registering, you agree to our Privacy Policy and Terms of Service.
        </p>

    </div>
</div>

<footer>
    © 2026 Pollify. All rights reserved.
</footer>

<script>
function validateRegistration() {

    var dobInput = document.getElementById("dob").value;

    if (!dobInput) {
        alert("Please select your Date of Birth.");
        return;
    }

    var birthDate = new Date(dobInput);
    var today = new Date();

    var age = today.getFullYear() - birthDate.getFullYear();
    var monthDiff = today.getMonth() - birthDate.getMonth();

    if (monthDiff < 0 || 
       (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
        age--;
    }

    if (age < 18) {
        alert("You must be at least 18 years old to register.");
    } else {
        window.location.href = "face_enroll.html";
    }
}
</script>

</body>
</html>
