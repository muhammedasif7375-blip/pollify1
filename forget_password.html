<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - POLLIFY</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            background: linear-gradient(135deg, #f8fbff, #e2ecff);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Connected Navbar */
        .custom-nav {
            position: fixed;
            width: 100%;
            top: 0;
            padding: 15px 30px;
            background: rgba(255,255,255,0.95);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            z-index: 1000;
        }

        .custom-nav a {
            text-decoration: none;
            margin-right: 15px;
            color: #333;
            font-weight: 500;
        }

        .custom-nav a:hover {
            color: #0d6efd;
        }

        .reset-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 140px 15px 40px 15px;
        }

        .reset-card {
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }

        .btn-reset {
            background: linear-gradient(90deg, #4e73df, #1cc88a);
            border: none;
            border-radius: 30px;
            padding: 12px;
            font-weight: 600;
            color: white;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 14px;
            color: gray;
        }
    </style>
</head>

<body>

<!-- Connected Navbar -->
<nav class="custom-nav">
    <div style="font-weight:bold;">
        <i class="bi bi-shield-check text-primary"></i> POLLIFY
    </div>

    <div>
        <a href="home.html">Home</a>
        <a href="about.html">About</a>
        <a href="team.html">Team</a>
        <a href="contact.html">Contact</a>
        <a href="register.html">Register</a>
        <a href="login.html">Login</a>
    </div>
</nav>

<div class="reset-wrapper">
    <div class="reset-card">

        <h2 class="text-center fw-bold mb-4">Reset Password</h2>

        <form>
            <div class="mb-3">
                <input type="email" class="form-control" 
                placeholder="Enter your registered email" required>
            </div>

            <button type="button" onclick="resetPassword()" 
                class="btn btn-reset w-100">
                Send Reset Link
            </button>
        </form>

        <p class="text-center mt-3">
            <a href="login.html">Back to Login</a>
        </p>

    </div>
</div>

<footer>
    © 2026 Pollify. All rights reserved.
</footer>

<script>
function resetPassword() {
    alert("Password reset link sent to your email!");
    window.location.href = "login.html";
}
</script>

</body>
</html>
