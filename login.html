<!DOCTYPE html>
<html>
<head>
    <title>Login - POLLIFY</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            background: linear-gradient(135deg, #f8fbff, #e2ecff);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
        }

        .login-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 15px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }

        .form-control {
            border-radius: 12px;
            padding: 12px;
        }

        .btn-login {
            background: linear-gradient(90deg, #4e73df, #1cc88a);
            border: none;
            border-radius: 30px;
            padding: 12px;
            font-weight: 600;
            color: white;
        }

        .btn-login:hover {
            opacity: 0.9;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 14px;
            color: gray;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg px-4 shadow-sm">
    <div class="container-fluid">
        <span class="fw-bold">
            <i class="bi bi-shield-check text-primary"></i> Pollify
        </span>
        <a href="register.html" class="btn btn-outline-secondary rounded-pill px-4">
            Register
        </a>
    </div>
</nav>

<!-- Login Section -->
<div class="login-wrapper">
    <div class="login-card">

        <h2 class="text-center fw-bold mb-4">Login</h2>

        <form>

            <div class="mb-3">
                <input type="email" class="form-control" placeholder="Email" required>
            </div>

            <div class="mb-3">
                <input type="password" class="form-control" placeholder="Password" required>
            </div>

            <button type="button" onclick="proceedToFaceAuth()" 
                class="btn btn-login w-100">
                Continue
            </button>

        </form>

        <p class="text-center mt-3">
            Don't have an account?
            <a href="register.html">Create Account</a>
        </p>

        <p class="text-center mt-2">
    <a href="forgot_password.html" class="text-decoration-none">
        Forgot Password?
    </a>
</p>

    </div>
</div>

<footer>
    © 2026 Pollify. All rights reserved.
</footer>

<script>
function proceedToFaceAuth() {
    // Later this will validate credentials from backend
    window.location.href = "face_auth.html";
}
</script>

</body>
</html>
